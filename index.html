<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播购物模拟</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {background:#f5f5f5; font-family:微软雅黑;}
.live-wrap {max-width:800px;margin:20px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px #0002;}
video {width:100%;display:block;}
.host-bar {padding:12px 15px;border-bottom:1px #eee solid;display:flex;align-items:center;}
.avatar {width:40px;height:40px;border-radius:50%;background:#ff6700;color:#fff;text-align:center;line-height:40px;font-weight:bold;margin-right:10px;}
.host-name {font-size:16px;font-weight:bold;}
.live-tag {background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:4px;margin-left:8px;}

/* 底部商品弹窗 */
.product-pop {
  position:fixed; 
  bottom:25px; 
  left:50%; 
  transform:translateX(-50%);
  width:calc(100% - 40px); 
  max-width:800px;
  background:#fff; 
  border-radius:14px;
  box-shadow:0 5px 25px rgba(0,0,0,0.15); 
  padding:20px; 
  display:none; 
  z-index:999;
}
.product-pop.show {display:block;}

.pop-row {
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:16px;
}
.pop-left-img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}
.pop-right-text {
  flex:1;
}
.p-title {font-size:18px;font-weight:bold;margin-bottom:8px;line-height:1.4;}
.p-price {color:#ff4400;font-size:20px;font-weight:bold;}

/* 新增：双按钮并排容器 */
.btn-row {
  display:flex;
  gap:12px;
}
/* 左右两个按钮各占一半宽度 */
.btn-half {
  flex:1;
  padding:14px;
  border-radius:10px;
  border:0;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
}
/* 左侧查看详情按钮 */
.btn-detail {
  background:#f0f0f0;
  color:#333;
}
/* 右侧立即下单按钮 */
.btn-buy {
  background:#ff6700;
  color:#fff;
}

/* 全屏遮罩：顶部30%透明，不遮挡视频 */
.detail-mask {
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  background:linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.6) 25%);
}
.detail-mask.show {display:block;}

/* 详情弹窗：仅占据下方75%可视区域，顶部留白显示视频 */
.detail-box {
  width:92%;
  max-width:780px;
  height:60vh;
  background:#fff;
  border-radius:14px;
  position:absolute;
  left:50%;
  bottom:5vh;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.detail-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
}
.detail-close {
  background:#eee;
  border:0;
  width:32px;
  height:32px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}
.detail-iframe {
  flex:1;
  width:100%;
  border:0;
}
</style>
</head>
<body>

<div class="live-wrap">
  <video id="v" controls preload="auto"
playsinline webkit-playsinline
x5-video-player-type="h5"
x5-video-player-fullscreen="false"
controlslist="nofullscreen">
    <source src="https://voluble-gumdrop-e6919a.netlify.app/explainvideo.mp4" type="video/mp4">
    您的浏览器不支持视频播放，请更换浏览器重试
</video>
  <div class="host-bar">
    <div class="avatar">BLT</div>
    <div>
      <div class="host-name">BLT品牌</div>
      <span class="live-tag">直播中</span>
    </div>
  </div>
</div>

<!-- 底部商品弹窗（按钮改为左右双栏） -->
<div class="product-pop" id="pop">
  <div class="pop-row">
    <img class="pop-left-img" src="https://matcha998.github.io/live-demo/mainimage6.8.jpg">
    <div class="pop-right-text">
      <div class="p-title">BLT零感豆AirX升级版蓝牙耳机</div>
      <div class="p-price">直播间专享特惠 ¥89.9</div>
    </div>
  </div>
  <!-- 左右两分按钮 -->
  <div class="btn-row">
  <button class="btn-half btn-detail" id="openDetailBtn">查看完整图文详情</button>
  <!-- 新增 id="buyBtn" -->
  <button class="btn-half btn-buy" id="buyBtn">立即下单</button>
</div>
</div>

<!-- 内嵌详情弹窗（顶部25%区域露出视频，不被遮挡） -->
<div class="detail-mask" id="detailMask">
  <div class="detail-box">
    <div class="detail-top">
      <span>商品完整详情</span>
      <button class="detail-close" id="closeDetailBtn">×</button>
    </div>
    <iframe class="detail-iframe" src="https://Matcha998.github.io/live-demo/detail.html"></iframe>
  </div>
</div>

<script>
// 全屏拦截（你新加的）
document.addEventListener('fullscreenchange', function(){
    if(document.fullscreenElement){
        document.exitFullscreen();
    }
});
document.addEventListener('webkitfullscreenchange', function(){
    if(document.webkitFullscreenElement){
        document.webkitExitFullscreen();
    }
});
const v=document.getElementById('v');
const pop=document.getElementById('pop');
const detailMask = document.getElementById('detailMask');
const openDetailBtn = document.getElementById('openDetailBtn');
const closeDetailBtn = document.getElementById('closeDetailBtn');
const buyBtn = document.getElementById('buyBtn'); // 新增下单按钮获取

// 视频5秒弹出商品弹窗，30秒隐藏
v.addEventListener('timeupdate',()=>{
  if(v.currentTime>=5 && v.currentTime<30){
    pop.classList.add('show');
  }else{
    pop.classList.remove('show');
  }
});

// 点击查看详情：发送详情点击标记
openDetailBtn.addEventListener('click', ()=>{
  detailMask.classList.add('show');
  window.parent.postMessage({trigger:"click_detail_btn"}, "*");
});

// 点击立即下单：发送下单点击标记（新增）
buyBtn.addEventListener('click', ()=>{
  window.parent.postMessage({trigger:"click_buy_btn"}, "*");
});

// 关闭详情弹窗
closeDetailBtn.addEventListener('click', ()=>{
  detailMask.classList.remove('show');
});
// 点击遮罩灰色区域关闭弹窗
detailMask.addEventListener('click', (e)=>{
  if(e.target === detailMask){
    detailMask.classList.remove('show');
  }
});
</script>

</body>
</html>
