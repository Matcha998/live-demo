<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播-无主播讲解对照组</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {background:#f5f5f5; font-family:微软雅黑;}
.live-wrap {max-width:800px;margin:20px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px #0002;}
video {width:100%;display:block;}
.host-bar {padding:12px 15px;border-bottom:1px #eee solid;display:flex;align-items:center;}
.avatar {width:40px;height:40px;border-radius:50%;background:#ff6700;color:#fff;text-align:center;line-height:40px;font-weight:bold;margin-right:10px;}
.host-name {font-size:16px;font-weight:bold;}
.live-tag {background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:4px;margin-left:8px;}

/* 唤起商品弹窗的悬浮按钮：和商品弹窗同位置，不脱离视频区域 */
.trigger-pop-btn{
  position:fixed; 
  bottom:120px; 
  left:50%; 
  transform:translateX(-50%);
  width:calc(100% - 80px); 
  max-width:760px;
  padding:12px 24px;
  background:#eeeeee;
  border:0;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  z-index:998;
}

/* 对照组：商品弹窗默认隐藏，不会自动弹出 */
.product-pop {
  position:fixed; 
  bottom:25px; 
  left:50%; 
  transform:translateX(-50%);
  width:calc(100% - 40px); 
  max-width:800px;
  background:#fff; 
  border-radius:14px;
  box-shadow:0 5px 25px rgba(0,0,0,0.15); 
  padding:20px; 
  display:none; 
  z-index:999;
}
.product-pop.show {display:block;}

.pop-row {
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:16px;
}
.pop-left-img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}
.pop-right-text {
  flex:1;
}
.p-title {font-size:18px;font-weight:bold;margin-bottom:8px;line-height:1.4;}
.p-price {color:#ff4400;font-size:20px;font-weight:bold;}

/* 双按钮并排容器，和实验组样式完全统一 */
.btn-row {
  display:flex;
  gap:12px;
}
.btn-half {
  flex:1;
  padding:14px;
  border-radius:10px;
  border:0;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
}
.btn-detail {
  background:#f0f0f0;
  color:#333;
}
.btn-buy {
  background:#ff6700;
  color:#fff;
}

/* 详情弹窗样式和实验组完全一致，顶部30%透明露出视频 */
.detail-mask {
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  background:linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.6) 25%);
}
.detail-mask.show {display:block;}
.detail-box {
  width:92%;
  max-width:780px;
  height:60vh;
  background:#fff;
  border-radius:14px;
  position:absolute;
  left:50%;
  bottom:5vh;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.detail-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
}
.detail-close {
  background:#eee;
  border:0;
  width:32px;
  height:32px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}
.detail-iframe {
  flex:1;
  width:100%;
  border:0;
}

/* 下单成功弹窗样式（初代无倒计时版本） */
.success-mask{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 10000;
  display: none;
}
.success-mask.show{
  display: flex;
  align-items: center;
  justify-content: center;
}
.success-box{
  width: 85%;
  max-width: 360px;
  background: #fff;
  border-radius: 14px;
  padding: 30px 25px;
  text-align: center;
}
.success-icon{
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #07c160;
  color: #fff;
  font-size: 32px;
  line-height: 60px;
  margin: 0 auto 15px;
}
.success-text{
  font-size: 20px;
  font-weight: bold;
  color: #333;
  margin-bottom: 20px;
}
.success-desc{
  color: #666;
  margin-bottom: 25px;
}
.success-btn{
  width: 100%;
  padding: 12px;
  background: #ff6700;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

<div class="live-wrap">
  <!-- 无讲解对照组视频链接 -->
  <video id="v" controls preload="auto"
playsinline webkit-playsinline
x5-video-player-type="h5"
x5-video-player-fullscreen="false"
controlslist="nofullscreen">
    <source src="https://meek-blini-b9ec1e.netlify.app/controlgroup.mp4" type="video/mp4">
    您的浏览器不支持视频播放
</video>
  <div class="host-bar">
    <div class="avatar">BLT</div>
    <div>
      <div class="host-name">BLT品牌</div>
      <span class="live-tag">直播中</span>
    </div>
  </div>
</div>

<!-- 悬浮唤起商品按钮：固定在视频画面内，不脱离视频底部区域 -->
<button class="trigger-pop-btn" id="triggerPopBtn">查看本场直播商品</button>

<!-- 商品弹窗：替换为左右双按钮布局 -->
<div class="product-pop" id="pop">
  <div class="pop-row">
    <img class="pop-left-img" src="https://matcha998.github.io/live-demo/mainimage6.8.jpg">
    <div class="pop-right-text">
      <div class="p-title">BLT零感豆AirX升级版蓝牙耳机</div>
      <div class="p-price">直播间专享特惠 ¥89.9</div>
    </div>
  </div>
  <!-- 左右两分按钮，分别绑定id -->
  <div class="btn-row">
    <button class="btn-half btn-detail" id="openDetailBtn">查看完整图文详情</button>
    <button class="btn-half btn-buy" id="buyBtn">立即下单</button>
  </div>
</div>

<!-- 详情弹窗（和实验组完全相同） -->
<div class="detail-mask" id="detailMask">
  <div class="detail-box">
    <div class="detail-top">
      <span>商品完整详情</span>
      <button class="detail-close" id="closeDetailBtn">×</button>
    </div>
    <iframe class="detail-iframe" src="https://Matcha998.github.io/live-demo/detail.html"></iframe>
  </div>
</div>

<!-- 下单成功弹窗（初代版本，无倒计时） -->
<div class="success-mask" id="successMask">
  <div class="success-box">
    <div class="success-icon">✓</div>
    <div class="success-text">下单成功！</div>
    <div class="success-desc">订单已提交，等待发货~</div>
    <button class="success-btn" id="closeSuccessBtn">确定</button>
  </div>
</div>

<script>
// 全屏拦截（你新加的）
document.addEventListener('fullscreenchange', function(){
    if(document.fullscreenElement){
        document.exitFullscreen();
    }
});
document.addEventListener('webkitfullscreenchange', function(){
    if(document.webkitFullscreenElement){
        document.webkitExitFullscreen();
    }
});
const pop = document.getElementById('pop');
const triggerPopBtn = document.getElementById('triggerPopBtn');
const detailMask = document.getElementById('detailMask');
const openDetailBtn = document.getElementById('openDetailBtn');
const closeDetailBtn = document.getElementById('closeDetailBtn');
const buyBtn = document.getElementById('buyBtn');

// 成功弹窗元素
const successMask = document.getElementById('successMask');
const closeSuccessBtn = document.getElementById('closeSuccessBtn');

// 点击悬浮按钮弹出商品卡片
triggerPopBtn.addEventListener('click', ()=>{
  pop.classList.add('show');
  triggerPopBtn.style.display = "none";
});

// 点击查看详情弹窗 + 发送详情点击标记
openDetailBtn.addEventListener('click', ()=>{
  detailMask.classList.add('show');
  window.parent.postMessage({trigger:"click_detail_btn"}, "*");
});

// 点击立即下单：上报 + 弹出成功弹窗
buyBtn.addEventListener('click', ()=>{
  window.parent.postMessage({trigger:"click_buy_btn"}, "*");
  successMask.classList.add('show');
});

// 点击确定关闭成功弹窗
closeSuccessBtn.addEventListener('click', ()=>{
  successMask.classList.remove('show');
})
// 点击遮罩灰色区域关闭弹窗
successMask.addEventListener('click', (e)=>{
  if(e.target === successMask){
    successMask.classList.remove('show');
  }
})

// 关闭详情弹窗
closeDetailBtn.addEventListener('click', ()=>{
  detailMask.classList.remove('show');
});
detailMask.addEventListener('click', (e)=>{
  if(e.target === detailMask){
    detailMask.classList.remove('show');
  }
});

// 商品弹窗关闭时，重新显示唤起按钮
pop.addEventListener('click', function(e){
  if(e.target === pop){
    pop.classList.remove('show');
    triggerPopBtn.style.display = "block";
  }
});
</script>
</body>
</html>
