<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播-无主播讲解对照组</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {background:#f5f5f5; font-family:微软雅黑;}
.live-wrap {max-width:800px;margin:20px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px #0002;}
video {width:100%;display:block;}
.host-bar {padding:12px 15px;border-bottom:1px #eee solid;display:flex;align-items:center;}
.avatar {width:40px;height:40px;border-radius:50%;background:#ff6700;color:#fff;text-align:center;line-height:40px;font-weight:bold;margin-right:10px;}
.host-name {font-size:16px;font-weight:bold;}
.live-tag {background:red;color:#fff;font-size:12px;padding:2px 6px;border-radius:4px;margin-left:8px;}

/* 对照组：商品弹窗默认隐藏，不会自动弹出 */
.product-pop {
  position:fixed; 
  bottom:25px; 
  left:50%; 
  transform:translateX(-50%);
  width:calc(100% - 40px); 
  max-width:800px;
  background:#fff; 
  border-radius:14px;
  box-shadow:0 5px 25px rgba(0,0,0,0.15); 
  padding:20px; 
  display:none; 
  z-index:999;
}
.product-pop.show {display:block;}

.pop-row {
  display:flex;
  gap:14px;
  align-items:center;
  margin-bottom:16px;
}
.pop-left-img {
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}
.pop-right-text {
  flex:1;
}
.p-title {font-size:18px;font-weight:bold;margin-bottom:8px;line-height:1.4;}
.p-price {color:#ff4400;font-size:20px;font-weight:bold;}
.p-btn {display:block;width:100%;padding:14px;background:#ff6700;color:#fff;text-align:center;border-radius:10px;border:0;cursor:pointer;font-weight:bold;font-size:16px;}

/* 对照组新增：底部固定查看商品按钮，需手动点击唤起弹窗 */
.trigger-pop-btn{
  display:block;
  margin:10px auto 0;
  padding:12px 24px;
  background:#eeeeee;
  border:0;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
}

/* 详情弹窗样式和实验组完全一致，保证外部效度统一 */
.detail-mask {
  position:fixed;
  inset:0;
  z-index:9999;
  display:none;
  background:linear-gradient(to bottom, transparent 25%, rgba(0,0,0,0.6) 25%);
}
.detail-mask.show {display:block;}
.detail-box {
  width:92%;
  max-width:780px;
  height:70vh;
  background:#fff;
  border-radius:14px;
  position:absolute;
  left:50%;
  bottom:5vh;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.detail-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  border-bottom:1px solid #eee;
}
.detail-close {
  background:#eee;
  border:0;
  width:32px;
  height:32px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
}
.detail-iframe {
  flex:1;
  width:100%;
  border:0;
}
</style>
</head>
<body>

<div class="live-wrap">
  <!-- 替换为【主播未讲解耳机】的视频链接 -->
  <video id="v" controls preload="auto">
    <source src="https://voluble-gumdrop-e6919a.netlify.app/explainvideo.mp4" type="video/mp4">
    您的浏览器不支持视频播放
  </video>
  <div class="host-bar">
    <div class="avatar">BLT</div>
    <div>
      <div class="host-name">BLT品牌</div>
      <span class="live-tag">直播中</span>
    </div>
  </div>
</div>

<!-- 对照组独有：手动唤起商品弹窗的按钮，全程不会自动弹出弹窗 -->
<button class="trigger-pop-btn" id="triggerPopBtn">查看本场直播商品</button>

<!-- 商品弹窗 -->
<div class="product-pop" id="pop">
  <div class="pop-row">
    <img class="pop-left-img" src="https://matcha998.github.io/live-demo/mainimage6.8.jpg">
    <div class="pop-right-text">
      <div class="p-title">BLT零感豆AirX升级版蓝牙耳机</div>
      <div class="p-price">直播间专享特惠 ¥89.9</div>
    </div>
  </div>
  <button class="p-btn" id="openDetailBtn">点击查看完整图文商品详情</button>
</div>

<!-- 详情弹窗（和实验组完全相同） -->
<div class="detail-mask" id="detailMask">
  <div class="detail-box">
    <div class="detail-top">
      <span>商品完整详情</span>
      <button class="detail-close" id="closeDetailBtn">×</button>
    </div>
    <iframe class="detail-iframe" src="https://Matcha998.github.io/live-demo/detail.html"></iframe>
  </div>
</div>

<script>
const pop = document.getElementById('pop');
const triggerPopBtn = document.getElementById('triggerPopBtn');
const detailMask = document.getElementById('detailMask');
const openDetailBtn = document.getElementById('openDetailBtn');
const closeDetailBtn = document.getElementById('closeDetailBtn');

// 对照组核心：删除视频计时自动弹出弹窗代码，只能手动点击按钮唤起商品卡片
triggerPopBtn.addEventListener('click', ()=>{
  pop.classList.add('show');
});

// 打开详情弹窗 + 向Credamo发送点击标记（和实验组完全一致，方便统一统计）
openDetailBtn.addEventListener('click', ()=>{
  detailMask.classList.add('show');
  window.parent.postMessage({trigger:"click_detail_btn"}, "*");
});

closeDetailBtn.addEventListener('click', ()=>{
  detailMask.classList.remove('show');
});
detailMask.addEventListener('click', (e)=>{
  if(e.target === detailMask){
    detailMask.classList.remove('show');
  }
});
</script>
</body>
</html>
